apiVersion: scaffolder.backstage.io/v1beta3
# https://backstage.io/docs/features/software-catalog/descriptor-format#kind-template
kind: Template
metadata:
  name: Microservice
  title: Create a microservice
  description: Creating a microservice with or without a DB
spec:
  owner: platform-team
  type: service

# 1. THE UI FORM
  parameters:
    - title: Provide Service Details
      required: [component_id, language, team]
      properties:
        component_id:
          title: Name
          type: string
          description: Unique name for the service (e.g., 'customer-api')
        language:
          title: Programming language
          type: string
          description: Choose the primary language for your service
          enum:
            - Python
            - Go
            - Java
            - Node.js
        db:
          title: postgres DB
          type: boolean
          description: Select the option to add a postgres db
        team:
          title: Team
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds: [Group]

  steps:
    - id: fetch-base
      name: Generating Service Files
      action: fetch:template
      input:
      # This points to the folder containing your .tf, k8s, and Dockerfile
        url: ./templates 
      # This creates the new folder named after the component_id
        targetPath: ./
      # These are the variables available to your skeleton files
        values:
          name: ${{ parameters.component_id }}
          language: ${{ parameters.language }}
          useDb: ${{ parameters.db }}
          owner: ${{ parameters.team }}
  
    - id: fetch-infra-request
      name: Generate platform infra request
      if: ${{ parameters.db }}
      action: fetch:template
      input:
        url: ./infra_request
        targetPath: ./infra-request-output
        values:
          component_id: ${{ parameters.component_id }}
          team: ${{ parameters.team }}

    - id: create-infra-pr
      name: Create platform infrastructure PR
      if: ${{ parameters.db }}
      action: publish:github:pull-request
      input:
        repoUrl: github.com?owner=aschreuder&repo=backstage-dev-platform
        branchName: add-${{ parameters.component_id }}-postgres
        title: "Add Postgres infrastructure for ${{ parameters.component_id }}"
        description: |
          Generated by Backstage.

          Service: ${{ parameters.component_id }}
          Owner: ${{ parameters.team }}
          Requested capability: Postgres
        sourcePath: ./infra-request-output
        targetPath: .

    - id: publish
      name: Publishing to GitHub
      action: publish:github
      input:
        #allowedHosts: ['github.com']
        description: 'New microservice for ${{ parameters.component_id }}'
        # This creates a repo with the same name as the service
        repoUrl: 'github.com?owner=aschreuder&repo=${{ parameters.component_id }}'

    # The final step is to register our new component in the catalog.
    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: '/catalog-info.yaml'
