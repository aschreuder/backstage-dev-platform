name: Build and deploy shop_backend

on:
  push:
    branches:
      - main

env: 
  IMAGE_REPO: backstage-infrastructure/shop_backend
  CHART_PATH: helm/shop_backend
  RELEASE_NAME: shop_backend

jobs:
  # BUILD STAGE
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into container registry
        run: | 
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build and Push image
        id: set-tag
        run: | 
          TAG="${GITHUB_SHA}"
          IMAGE_TAG="${IMAGE_REPO}:${TAG}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          # This makes the tag available to the deployment jobs
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  # DEPLOYMENT STAGES (Sequential)
  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to Dev
        uses: ./.github/actions/helm-deploy
        with:
          environment: dev
          image_tag: ${{ needs.build.outputs.image_tag }}
          kube_config: ${{ secrets.KUBE_CONFIG }}

  deploy-stg:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to Staging
        uses: ./.github/actions/helm-deploy
        with:
          environment: stg
          image_tag: ${{ needs.build.outputs.image_tag }}
          kube_config: ${{ secrets.KUBE_CONFIG }}

  deploy-prod:
    needs: deploy-stg
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Deploy to Production
        uses: ./.github/actions/helm-deploy
        with:
          environment: prod
          image_tag: ${{ needs.build.outputs.image_tag }}
          kube_config: ${{ secrets.KUBE_CONFIG }}