name: 'Helm Deploy and Verify'
description: 'Reusable logic to deploy the shop_backend via Helm'
inputs:
  environment:
    description: 'The target environment (dev, stg, prod)'
    required: true
  image_tag:
    description: 'The Docker image tag to deploy'
    required: true
  kube_config:
    description: 'Base64 encoded Kubeconfig secret'
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up kubectl and Helm
      shell: bash
      run: |
        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        chmod +x kubectl && sudo mv kubectl /usr/local/bin/
        curl https://raw.githubusercontent.com/helm/helm/master/scripts/get-helm-3 | bash
        echo "${{ inputs.kube_config }}" | base64 -d > kubeconfig
        echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV

    - name: Helm upgrade/install
      shell: bash
      run: |
        ENV="${{ inputs.environment }}"
        CHART_PATH="helm/shop_backend"
        # Using a consistent release naming convention
        RELEASE_NAME="shop-backend-$ENV"
        
        echo "Deploying to $ENV environment..."
        helm upgrade --install "$RELEASE_NAME" "$CHART_PATH" \
          --namespace "$ENV" \
          --create-namespace \
          --set image.tag="${{ inputs.image_tag }}" \
          --set service.targetPort=8000 \
          --set service.port=80 \
          -f "$CHART_PATH/values-$ENV.yaml"

    - name: Verify deployment
      shell: bash
      run: |
        ENV="${{ inputs.environment }}"
        # Note: Name must match the one generated by your Helm template
        kubectl rollout status deployment/shop-backend-$ENV \
          --namespace "$ENV" \
          --timeout=120s